[profile.default]
src = "contracts"
script = "scripts"
test = "test"
out = "out"
libs = ["lib"]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]
solc_version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
polkadot_hub = "${POLKADOT_HUB_RPC_URL}"
